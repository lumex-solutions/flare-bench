name: bench (fastify, single run)

# A single run of the unmodified fastify/benchmarks tool. `compare -t` writes
# benchmark-results.json in fastify's exact format; render-single.mjs puts that into the
# README's single-run section. The measurement and the JSON output are fastify's; only the
# README rendering is ours. Use bench (5x median) for the stable history feed.
on:
  workflow_dispatch:

# Shared group with the 5x workflow so the two never push to the branch at the same time.
concurrency:
  group: bench
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  bench:
    name: Benchmark (fastify parity)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          check-latest: true

      - name: Install dependencies
        run: npm i --ignore-scripts

      - name: Run benchmarks
        run: npm start y 100 10 40

      - name: Compare results and render the single-run table
        run: |
          node ./benchmark compare -t
          node render-single.mjs

      - name: Upload results artifact
        # Safety net: the raw results survive even if the push fails.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-fastify-results-${{ github.run_id }}
          path: |
            results/
            benchmark-results.json
          if-no-files-found: ignore

      - name: Commit results
        # Rebase our one result commit on top of anything that landed on main during the run.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add benchmark-results.json README.md
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m "bench: fastify-parity results run ${GITHUB_RUN_ID}"
            pushed=false
            for i in 1 2 3; do
              if git pull --rebase origin main && git push; then
                pushed=true
                break
              fi
              echo "push attempt $i failed; retrying"
              sleep 5
            done
            if [ "$pushed" != "true" ]; then
              echo "all push attempts failed; results are in the run artifact"
              exit 1
            fi
          fi
