name: bench (5x median)

# Manual trigger only. Each run performs five sweeps of the benchmark tool on a fresh
# ubuntu-latest runner and commits the aggregated median result into history/. This is the
# stable, publishable feed; for a single fastify-style run see bench-fastify.yml.
on:
  workflow_dispatch:

# Serialize runs so two commits to history/ cannot race.
concurrency:
  group: bench
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  bench:
    name: Benchmark
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v6
        # persist-credentials defaults to true, leaving GITHUB_TOKEN configured for the push.

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          check-latest: true

      - name: Install dependencies
        run: npm i --ignore-scripts

      - name: Run five sweeps
        run: |
          for i in 1 2 3 4 5; do
            echo "sweep $i/5"
            node benchmark.js y 100 10 40
            mkdir -p "runs/run-$i"
            mv results/*.json "runs/run-$i/"
          done

      - name: Aggregate and summarize
        run: node aggregate.mjs runs history >> "$GITHUB_STEP_SUMMARY"

      - name: Upload results artifact
        # Safety net: the raw sweeps and the aggregated record survive even if the push fails.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-results-${{ github.run_id }}
          path: |
            runs/
            history/
          if-no-files-found: ignore

      - name: Commit results history
        # The job runs ~35 minutes, so the checkout is stale by push time whenever anything
        # landed on main meanwhile; rebase our one result commit on top before pushing.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add history/ README.md
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m "bench: results run ${GITHUB_RUN_ID}"
            pushed=false
            for i in 1 2 3; do
              if git pull --rebase origin main && git push; then
                pushed=true
                break
              fi
              echo "push attempt $i failed; retrying"
              sleep 5
            done
            if [ "$pushed" != "true" ]; then
              echo "all push attempts failed; results are in the run artifact"
              exit 1
            fi
          fi
